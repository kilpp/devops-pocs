services:
  jaeger:
    image: docker.io/jaegertracing/jaeger:2.16.0
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317"         # OTLP gRPC (internal, used by collector)
    volumes:
      - ./jaeger-config.yml:/etc/jaeger/config.yml
    command: ["--config", "/etc/jaeger/config.yml"]

  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"   # Prometheus metrics endpoint
    depends_on:
      - jaeger

  prometheus:
    image: docker.io/prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  grafana:
    image: docker.io/grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  order-storage:
    build:
      context: .
      dockerfile: services/order-storage/Dockerfile
    ports:
      - "8083:8083"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    depends_on:
      - otel-collector

  order-processor:
    build:
      context: .
      dockerfile: services/order-processor/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - ORDER_STORAGE_URL=http://order-storage:8083
    depends_on:
      - otel-collector
      - order-storage

  order-ingestion:
    build:
      context: .
      dockerfile: services/order-ingestion/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - ORDER_PROCESSOR_URL=http://order-processor:8082
    depends_on:
      - otel-collector
      - order-processor
